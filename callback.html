<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ログイン処理中…</title>
<style>
  body { font-family: -apple-system, "Segoe UI", sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f7; color: #1d1d1f; }
  .box { text-align: center; padding: 40px; background: #fff; border-radius: 14px; border: 1px solid #e5e5ea; max-width: 420px; }
</style>
</head>
<body>
<div class="box">
  <p id="msg">ログイン処理中…</p>
</div>
<script>
  // fragment (#token=...&state=...) を解析して localStorage に保存
  const frag = new URLSearchParams(location.hash.slice(1));
  const token = frag.get("token");
  const state = frag.get("state");
  const expectedState = sessionStorage.getItem("oauth_state");
  sessionStorage.removeItem("oauth_state");

  if (!token) {
    document.getElementById("msg").textContent = "トークンが取得できませんでした。";
  } else if (expectedState && state !== expectedState) {
    document.getElementById("msg").textContent = "state パラメータ不一致。CSRF 疑い。";
  } else {
    localStorage.setItem("mansion_app_token", token);
    location.replace("./");
  }
</script>
</body>
</html>
