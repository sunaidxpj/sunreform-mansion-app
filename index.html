<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンリフォーム マンション検索</title>
<style>
  /* ==========================================================
     UI_GUIDE.md §2 デザイントークン
     アプリ固有色: 朱色（マンション検索）
  ========================================================== */
  :root {
    /* === Primary（朱色） === */
    --primary: #DC4625;
    --primary-dark: #B03617;
    --primary-soft: #FCEAE3;
    --primary-faint: #FFF5F1;

    /* === Neutrals === */
    --bg: #F4F5F7;
    --surface: #FFFFFF;
    --surface-alt: #FAFBFC;
    --border: #E1E4E8;
    --border-soft: #EDEFF2;

    --text: #1F2328;
    --text-muted: #57606A;
    --text-subtle: #8C959F;

    /* === Feedback === */
    --success: #1F883D;  --success-bg: #DAFBE1;
    --info:    #0969DA;  --info-bg:    #DDF4FF;
    --warn:    #9A6700;  --warn-bg:    #FFF8C5;
    --danger:  #CF222E;  --danger-bg:  #FFEBE9;
    --neutral-bg: #EAEEF2;

    /* === Radius === */
    --radius-sm: 6px;
    --radius:    10px;
    --radius-lg: 14px;
    --radius-pill: 999px;

    /* === Shadow === */
    --shadow-sm: 0 1px 2px rgba(15,23,42,.05);
    --shadow:    0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.04);
    --shadow-lg: 0 4px 14px rgba(15,23,42,.10);

    /* === Motion === */
    --t-fast: 120ms ease;
    --t:      180ms ease;
  }

  * { box-sizing: border-box; }

  /* ===== UI_GUIDE.md §3 タイポグラフィ ===== */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    background: var(--bg);
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== UI_GUIDE.md §5 ヘッダー骨格 ===== */
  body::before {
    content: ""; display: block; height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 {
    margin: 0; font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
    display: flex; align-items: center;
  }
  header h1::before {
    content: ""; display: inline-block;
    width: 4px; height: 18px; background: var(--primary);
    border-radius: 2px; margin-right: 12px;
  }
  header .user { margin-left: auto; font-size: 13px; color: var(--text-muted); }
  header .logout {
    background: none; border: 0; color: var(--text-muted);
    font-size: 13px; padding: 6px 12px;
    border-radius: var(--radius-sm); cursor: pointer;
    transition: var(--t-fast);
  }
  header .logout:hover { background: var(--bg); color: var(--text); }

  /* ===== UI_GUIDE.md §4 レイアウト ===== */
  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* ===== 検索バー（input） UI_GUIDE.md §6.2 ===== */
  .search {
    position: sticky; top: 0;
    background: var(--bg);
    padding: 16px 0 12px;
    z-index: 10;
  }
  .search input {
    width: 100%; padding: 14px 16px; font-size: 15px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); color: var(--text);
    outline: none; transition: var(--t-fast);
  }
  .search input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent);
  }
  .search input::placeholder { color: var(--text-subtle); }

  .meta { color: var(--text-muted); font-size: 13px; margin: 8px 2px; }

  /* ===== 並び替えバー ===== */
  .sort-bar {
    display: flex; align-items: center; gap: 8px;
    margin: 12px 2px; color: var(--text-muted); font-size: 13px;
  }
  .sort-bar select {
    width: auto; padding: 6px 12px; font-size: 13px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: var(--t-fast);
  }
  .sort-bar select:hover { border-color: var(--text-subtle); }
  .sort-bar select:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 18%, transparent);
  }

  /* ===== UI_GUIDE.md §6.3 カード ===== */
  .results { display: grid; gap: 8px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px;
    box-shadow: var(--shadow-sm);
  }
  .card.interactive { cursor: pointer; transition: var(--t-fast); }
  .card.interactive:hover {
    border-color: var(--primary);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .card .name { font-weight: 600; font-size: 15px; letter-spacing: -0.005em; }
  .card .city { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

  /* ===== UI_GUIDE.md §6.4 chip ===== */
  .chip {
    display: inline-block; padding: 3px 10px;
    font-size: 12px; font-weight: 500;
    border-radius: var(--radius-pill); white-space: nowrap;
  }
  .chip-success { background: var(--success-bg); color: var(--success); }
  .chip-info    { background: var(--info-bg);    color: var(--info); }
  .chip-warn    { background: var(--warn-bg);    color: var(--warn); }
  .chip-danger  { background: var(--danger-bg);  color: var(--danger); }
  .chip-muted   { background: var(--neutral-bg); color: var(--text-muted); }
  .chip-primary { background: var(--primary); color: #fff; }

  .count-badge {
    display: inline-block; margin-left: 8px;
    background: var(--primary); color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: var(--radius-pill);
    vertical-align: middle;
  }

  /* ===== 詳細画面 ===== */
  .detail {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    margin-top: 12px; box-shadow: var(--shadow-sm);
  }
  .detail h2 { margin: 0 0 4px; font-size: 22px; font-weight: 700; letter-spacing: -0.015em; }
  .detail .sub { color: var(--text-muted); font-size: 13px; margin-bottom: 16px; }
  .detail .section { margin-top: 24px; }

  /* ===== UI_GUIDE.md §6.8 セクション見出し ===== */
  .section-title, .detail .section h3 {
    font-size: 12px; font-weight: 700;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em;
    margin: 0 0 12px; padding-left: 12px; position: relative;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before, .detail .section h3::before {
    content: ""; position: absolute; left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 14px;
    background: var(--primary); border-radius: 2px;
  }

  /* ===== UI_GUIDE.md §6.1 ボタン（編集・戻る等） ===== */
  .btn {
    padding: 7px 16px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: var(--t-fast);
  }
  .btn:hover { background: var(--bg); }
  .btn-primary {
    background: var(--primary); border-color: var(--primary); color: #fff;
  }
  .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
  .btn-pill { border-radius: var(--radius-pill); padding: 4px 12px; font-size: 12px; }

  .edit-memo {
    background: transparent; border: 1px solid var(--border);
    color: var(--primary);
    padding: 4px 12px; border-radius: var(--radius-pill);
    font-size: 12px; font-weight: 500;
    cursor: pointer; transition: var(--t-fast);
  }
  .edit-memo:hover { background: var(--primary-faint); border-color: var(--primary); }

  .back {
    cursor: pointer; background: none; border: 0;
    color: var(--text-muted); font-size: 14px; font-weight: 500;
    padding: 8px 0;
    transition: var(--t-fast);
  }
  .back:hover { color: var(--primary); }

  /* ===== UI_GUIDE.md §6.9 callout（申し送り欄） ===== */
  .callout {
    background: var(--primary-faint);
    border-left: 3px solid var(--primary);
    padding: 14px 18px; border-radius: var(--radius-sm);
    font-size: 14px; line-height: 1.7;
    white-space: pre-wrap; color: var(--text);
  }
  .callout.empty {
    background: var(--surface-alt);
    border-left-color: var(--border-soft);
    color: var(--text-subtle); font-style: italic;
  }
  .callout-info    { background: var(--info-bg);    border-left-color: var(--info); }
  .callout-warn    { background: var(--warn-bg);    border-left-color: var(--warn); }
  .callout-danger  { background: var(--danger-bg);  border-left-color: var(--danger); }

  /* ===== 原文表示（raw_notes） ===== */
  .raw-toggle {
    background: none; border: 0; color: var(--primary);
    cursor: pointer; font-size: 13px; font-weight: 500;
    padding: 8px 0;
    transition: var(--t-fast);
  }
  .raw-toggle:hover { color: var(--primary-dark); text-decoration: underline; }
  .raw-list { margin-top: 8px; display: grid; gap: 8px; }
  .raw-item {
    background: var(--surface-alt); border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm); padding: 12px 16px;
    font-size: 13px; transition: var(--t-fast);
  }
  .raw-item:hover { border-color: var(--border); }
  .raw-item .meta {
    color: var(--text-muted); font-size: 12px; margin-bottom: 4px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .raw-item .src-app    { color: var(--info);     font-weight: 500; }
  .raw-item .src-dm     { color: var(--success);  font-weight: 500; }
  .raw-item .src-legacy { color: var(--text-subtle); font-weight: 500; }
  .raw-item .body { white-space: pre-wrap; line-height: 1.6; }

  /* ===== ANDPAD情報セクション（現在は未利用） ===== */
  .andpad-synced {
    color: var(--text-muted); font-size: 11px; font-weight: 400;
    margin-left: 8px; text-transform: none; letter-spacing: normal;
  }
  .andpad-body { display: grid; gap: 16px; }
  .andpad-group h4 { margin: 0 0 8px; font-size: 13px; color: var(--text); font-weight: 600; }
  .andpad-row { display: flex; gap: 12px; padding: 4px 0; border-bottom: 1px solid var(--border-soft); font-size: 13px; }
  .andpad-row:last-child { border-bottom: 0; }
  .andpad-k { color: var(--text-muted); min-width: 9em; flex-shrink: 0; }
  .andpad-v { color: var(--text); white-space: pre-wrap; word-break: break-word; }

  /* ===== UI_GUIDE.md §6.5 テーブル ===== */
  .sites table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    background: var(--surface); border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .sites th {
    background: var(--surface-alt);
    text-align: left; padding: 12px 16px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    color: var(--text-muted); text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .sites td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    vertical-align: middle;
  }
  .sites tbody tr.site-row { cursor: pointer; transition: background var(--t-fast); }
  .sites tbody tr.site-row:hover { background: var(--primary-faint); }
  .sites tbody tr.site-row.expanded { background: var(--primary-faint); }
  .sites tbody tr.site-row .arrow {
    display: inline-block; width: 12px;
    color: var(--text-subtle); transition: transform var(--t);
  }
  .sites tbody tr.site-row.expanded .arrow {
    transform: rotate(90deg); color: var(--primary);
  }
  .sites tbody tr.site-detail td {
    background: var(--primary-faint);
    padding: 12px 16px;
    border-bottom: 1px solid var(--primary-soft);
  }
  .sites tbody tr.site-detail .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 8px 24px; font-size: 13px;
  }
  .sites tbody tr.site-detail .k {
    color: var(--text-muted); margin-right: 6px; font-weight: 500;
  }

  /* ===== ログイン画面 ===== */
  .login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, var(--primary-faint) 0%, var(--bg) 70%);
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 32px;
    text-align: center; max-width: 420px;
    box-shadow: var(--shadow-lg);
  }
  .login-box h2 { margin: 0 0 8px; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .login-box p { color: var(--text-muted); margin: 0 0 24px; font-size: 14px; line-height: 1.6; }
  .login-box button {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border);
    padding: 12px 24px; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 500;
    cursor: pointer; transition: var(--t-fast);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .login-box button:hover {
    border-color: var(--primary); background: var(--primary-faint);
    color: var(--primary-dark);
  }

  /* ===== その他 ===== */
  .empty-state, .loading {
    text-align: center; color: var(--text-muted);
    padding: 32px 16px; font-size: 14px;
  }
  .error {
    background: var(--danger-bg); color: var(--danger);
    padding: 12px 16px; border-radius: var(--radius-sm);
    margin: 12px 0; font-size: 14px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .error .retry {
    background: var(--surface);
    border: 1px solid var(--danger); color: var(--danger);
    padding: 4px 12px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    cursor: pointer; transition: var(--t-fast);
  }
  .error .retry:hover { background: var(--danger); color: #fff; }

  /* ===== モバイル ===== */
  @media (max-width: 640px) {
    header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    header h1 { font-size: 15px; }
    header h1::before { height: 16px; }
    header .user { font-size: 12px; width: 100%; order: 3; margin-left: 0; }
    .container { padding: 12px 16px; }
    .detail { padding: 16px; }
    .detail h2 { font-size: 17px; }

    .andpad-row { flex-direction: column; gap: 0; }
    .andpad-k { font-size: 12px; }

    .sites table, .sites thead, .sites tbody, .sites tr, .sites td, .sites th { display: block; }
    .sites thead { display: none; }
    .sites tbody tr {
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 16px; margin-bottom: 8px; background: var(--surface);
    }
    .sites tbody tr:hover { background: var(--surface); }
    .sites tbody tr.site-row:hover { background: var(--primary-faint); }
    .sites td { padding: 4px 0; border: 0; text-align: left !important; font-size: 13px; }
    .sites td::before {
      content: attr(data-label);
      font-weight: 500; color: var(--text-muted);
      margin-right: 8px; min-width: 5em; display: inline-block;
    }
    .sites td:empty, .sites td[data-empty="1"] { display: none; }
    .sites tbody tr.site-detail td { padding: 8px; }
    .sites tbody tr.site-detail .grid { grid-template-columns: 1fr; gap: 4px 0; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.30.0/lib/msal-browser.min.js"></script>
<script src="app.js"></script>
</body>
</html>
