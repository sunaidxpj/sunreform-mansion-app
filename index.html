<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンリフォーム マンション検索</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif; margin: 0; background: #f5f5f7; color: #1d1d1f; }
  header { background: #fff; border-bottom: 1px solid #d2d2d7; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  header .user { margin-left: auto; font-size: 13px; color: #6e6e73; }
  header .logout { margin-left: 8px; cursor: pointer; background: none; border: none; color: #0066cc; font-size: 13px; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px; }
  .search { position: sticky; top: 0; background: #f5f5f7; padding: 16px 0; z-index: 10; }
  .search input { width: 100%; padding: 14px 16px; font-size: 16px; border: 1px solid #d2d2d7; border-radius: 10px; background: #fff; }
  .search input:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,.15); }
  .meta { color: #6e6e73; font-size: 13px; margin: 8px 2px; }
  .results { display: grid; gap: 8px; }
  .card { background: #fff; border: 1px solid #e5e5ea; border-radius: 10px; padding: 12px 16px; cursor: pointer; transition: border-color .15s; }
  .card:hover { border-color: #0066cc; }
  .card .name { font-weight: 500; font-size: 15px; }
  .card .city { color: #6e6e73; font-size: 13px; margin-top: 2px; }
  .detail { background: #fff; border: 1px solid #e5e5ea; border-radius: 10px; padding: 20px; margin-top: 12px; }
  .detail h2 { margin: 0 0 4px; font-size: 20px; }
  .detail .sub { color: #6e6e73; font-size: 13px; margin-bottom: 16px; }
  .detail .section { margin-top: 20px; }
  .detail .section h3 { font-size: 14px; font-weight: 600; color: #6e6e73; text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 8px; display:flex; align-items:center; gap:8px; }
  .edit-memo { background: none; border: 1px solid #d2d2d7; color: #0066cc; padding: 2px 10px; border-radius: 999px; font-size: 12px; cursor: pointer; text-transform: none; letter-spacing: normal; }
  .edit-memo:hover { background: #f0f7ff; }
  .申し送り { white-space: pre-wrap; background: #fff9e6; border-left: 3px solid #f5a623; padding: 12px 16px; border-radius: 6px; font-size: 14px; line-height: 1.6; }
  .申し送り.empty { background: #f5f5f7; border-left-color: #d2d2d7; color: #6e6e73; }
  .sites table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .sites th, .sites td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #f0f0f2; }
  .sites th { background: #fafafa; font-weight: 500; color: #6e6e73; font-size: 12px; }
  .sites tbody tr:hover { background: #f9f9fb; }
  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-box { background: #fff; border: 1px solid #e5e5ea; border-radius: 14px; padding: 40px 48px; text-align: center; max-width: 420px; }
  .login-box h2 { margin: 0 0 8px; font-size: 20px; }
  .login-box p { color: #6e6e73; margin: 0 0 24px; font-size: 14px; }
  .login-box button { background: #24292e; color: #fff; border: 0; padding: 12px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
  .login-box button:hover { background: #1b1f23; }
  .empty-state, .loading { text-align: center; color: #6e6e73; padding: 40px 20px; }
  .back { cursor: pointer; background: none; border: 0; color: #0066cc; font-size: 14px; padding: 8px 0; }
  .back:hover { text-decoration: underline; }
  .error { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; padding: 12px 16px; border-radius: 8px; margin: 12px 0; font-size: 14px; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.30.0/lib/msal-browser.min.js"></script>
<script src="app.js"></script>
</body>
</html>
