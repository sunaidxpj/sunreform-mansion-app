<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サンリフォーム マンション検索</title>
<style>
  /* ==========================================================
     UI_GUIDE.md §2 デザイントークン （Aipo DNA / マスタード単色化）
  ========================================================== */
  :root {
    /* === Neutrals === */
    --bg: #FAFBFC;
    --surface: #FFFFFF;
    --surface-alt: #F5F7F9;
    --neutral-faint: #EEF1F4;
    --neutral-border: #DDE2E7;
    --neutral-strong: #B0B7BF;
    --text-muted: #6B7480;
    --text: #2C3138;
    --text-strong: #1A1F26;

    /* === Feedback === */
    --success: #2E8B6B;  --success-faint: #E8F3EE;
    --warn:    #C77A1F;  --warn-faint:    #FBF1E2;
    --danger:  #C04A3D;  --danger-faint:  #F8E8E5;
    --info:    #2A6FB0;  --info-faint:    #E5EFF8;

    /* === Radius === */
    --radius-sm: 2px;
    --radius:    4px;
    --radius-lg: 8px;
    --radius-pill: 999px;

    /* === Spacing === */
    --space-1: 4px;
    --space-2: 6px;
    --space-3: 8px;
    --space-4: 12px;
    --space-5: 16px;
    --space-6: 24px;
    --space-7: 32px;

    /* === Typography === */
    --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "Hiragino Kaku Gothic ProN", "Hiragino Sans",
                   "Meiryo", sans-serif;
    --fs-xs: 11px;
    --fs-sm: 12px;
    --fs-base: 13px;
    --fs-md: 14px;
    --fs-lg: 15px;
    --fs-xl: 17px;
    --fs-h: 22px;
    --lh-tight: 1.4;
    --lh-base: 1.6;

    /* === Shadow === */
    --shadow-none: none;
    --shadow-sm: 0 1px 2px rgba(20, 30, 50, 0.04);
    --shadow:    0 2px 6px rgba(20, 30, 50, 0.06);
    --shadow-modal: 0 8px 24px rgba(20, 30, 50, 0.12);

    /* === Motion === */
    --t-fast: 0.12s ease;
    --t-base: 0.2s ease;

    /* === Primary （全アプリ共通：マスタード） === */
    --primary: #C97A2E;
    --primary-dark: #9C5C1F;
    --primary-faint: #FAEFDD;
  }

  * { box-sizing: border-box; }

  /* ===== UI_GUIDE.md §8 共通骨格 ===== */
  body {
    font-family: var(--font-family);
    font-size: var(--fs-base);
    line-height: var(--lh-base);
    color: var(--text);
    background: var(--bg);
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: "";
    display: block;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--primary-dark));
  }

  /* ===== Header ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--neutral-border);
    padding: var(--space-4) var(--space-6);
    display: flex;
    align-items: center;
    gap: var(--space-4);
  }
  header h1 {
    font-size: var(--fs-h);
    font-weight: 600;
    color: var(--text-strong);
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin: 0;
  }
  header h1::before {
    content: "";
    display: inline-block;
    width: 4px;
    height: 18px;
    background: var(--primary);
    border-radius: var(--radius-sm);
  }
  header .user {
    margin-left: auto;
    font-size: var(--fs-sm);
    color: var(--text-muted);
  }
  header .logout {
    height: 26px;
    padding: 0 10px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-muted);
    font-size: var(--fs-sm);
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--t-fast);
  }
  header .logout:hover {
    background: var(--surface-alt);
    color: var(--text);
    border-color: var(--neutral-border);
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: var(--space-6);
  }

  /* ===== Inputs ===== */
  input, select, textarea {
    font-family: inherit;
    font-size: var(--fs-base);
    border: 1px solid var(--neutral-border);
    border-radius: var(--radius);
    padding: 8px 12px;
    background: var(--surface);
    color: var(--text);
    transition: var(--t-fast);
    width: 100%;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-faint);
  }
  input::placeholder { color: var(--neutral-strong); }

  /* ===== Search ===== */
  .search {
    position: sticky;
    top: 0;
    background: var(--bg);
    padding: var(--space-5) 0 var(--space-4);
    z-index: 10;
  }
  .search input {
    font-size: var(--fs-md);
    padding: 10px 14px;
  }

  .meta {
    color: var(--text-muted);
    font-size: var(--fs-sm);
    margin: var(--space-3) 2px;
  }

  /* ===== Sort bar ===== */
  .sort-bar {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin: var(--space-4) 2px;
    color: var(--text-muted);
    font-size: var(--fs-sm);
  }
  .sort-bar select {
    width: auto;
    padding: 6px 10px;
    font-size: var(--fs-sm);
  }

  /* ===== UI_GUIDE.md §3 ボタン ===== */
  .btn {
    height: 32px;
    padding: 0 14px;
    font-size: var(--fs-base);
    border: 1px solid var(--neutral-border);
    background: var(--surface);
    color: var(--text);
    border-radius: var(--radius);
    transition: var(--t-fast);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
  }
  .btn:hover { background: var(--surface-alt); border-color: var(--neutral-strong); }
  .btn:active { background: var(--neutral-faint); }
  .btn:disabled { background: var(--surface-alt); color: var(--neutral-strong); cursor: not-allowed; }
  .btn-primary {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
  }
  .btn-primary:hover {
    background: var(--primary-dark);
    border-color: var(--primary-dark);
  }
  .btn-danger {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
  }
  .btn-sm {
    height: 26px;
    padding: 0 10px;
    font-size: var(--fs-sm);
  }

  /* App-specific buttons (.btn 系の継承) */
  .edit-memo {
    height: 26px;
    padding: 0 10px;
    font-size: var(--fs-sm);
    border: 1px solid var(--neutral-border);
    background: var(--surface);
    color: var(--text);
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--t-fast);
  }
  .edit-memo:hover { background: var(--surface-alt); border-color: var(--neutral-strong); }

  .back {
    height: 32px;
    padding: 0 14px;
    font-size: var(--fs-base);
    border: 1px solid var(--neutral-border);
    background: var(--surface);
    color: var(--text);
    border-radius: var(--radius);
    cursor: pointer;
    transition: var(--t-fast);
  }
  .back:hover { background: var(--surface-alt); border-color: var(--neutral-strong); }

  /* ===== UI_GUIDE.md §5 カード ===== */
  .results { display: grid; gap: var(--space-3); }
  .card {
    background: var(--surface);
    border: 1px solid var(--neutral-border);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
  }
  .card.interactive {
    cursor: pointer;
    transition: var(--t-fast);
  }
  .card.interactive:hover {
    border-color: var(--primary);
    box-shadow: var(--shadow-sm);
  }
  .card .name {
    font-weight: 600;
    font-size: var(--fs-md);
    color: var(--text-strong);
  }
  .card .city {
    color: var(--text-muted);
    font-size: var(--fs-sm);
    margin-top: var(--space-1);
  }

  /* ===== UI_GUIDE.md §6.1 チップ ===== */
  [class*="chip-"] {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 10px;
    font-size: var(--fs-xs);
    font-weight: 600;
    border-radius: var(--radius-pill);
  }
  .chip-success { background: var(--success-faint); color: var(--success); }
  .chip-info    { background: var(--info-faint);    color: var(--info); }
  .chip-warn    { background: var(--warn-faint);    color: var(--warn); }
  .chip-danger  { background: var(--danger-faint);  color: var(--danger); }
  .chip-muted   { background: var(--neutral-faint); color: var(--text-muted); }
  .chip-primary { background: var(--primary-faint); color: var(--primary-dark); }

  .count-badge {
    display: inline-flex;
    align-items: center;
    height: 22px;
    margin-left: var(--space-3);
    padding: 0 10px;
    background: var(--primary-faint);
    color: var(--primary-dark);
    font-size: var(--fs-xs);
    font-weight: 600;
    border-radius: var(--radius-pill);
    vertical-align: middle;
  }

  /* ===== Detail （カード亜種） ===== */
  .detail {
    background: var(--surface);
    border: 1px solid var(--neutral-border);
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    margin-top: var(--space-4);
  }
  .detail h2 {
    margin: 0 0 var(--space-1);
    font-size: var(--fs-h);
    font-weight: 600;
    color: var(--text-strong);
  }
  .detail .sub {
    color: var(--text-muted);
    font-size: var(--fs-sm);
    margin-bottom: var(--space-5);
  }
  .detail .section { margin-top: var(--space-6); }

  /* ===== UI_GUIDE.md §6.3 セクション見出し ===== */
  .section-title, .detail .section h3 {
    font-size: var(--fs-md);
    font-weight: 600;
    color: var(--text-strong);
    padding-left: 10px;
    border-left: 3px solid var(--primary);
    margin: 0 0 var(--space-4);
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }

  /* ===== UI_GUIDE.md §6.2 コールアウト ===== */
  .callout {
    padding: var(--space-4);
    border-radius: var(--radius);
    border-left: 3px solid var(--primary);
    background: var(--primary-faint);
    font-size: var(--fs-base);
    line-height: var(--lh-base);
    white-space: pre-wrap;
    color: var(--text);
  }
  .callout.empty {
    background: var(--surface-alt);
    border-left-color: var(--neutral-border);
    color: var(--text-muted);
    font-style: italic;
  }
  .callout-info   { background: var(--info-faint);   border-left-color: var(--info); }
  .callout-warn   { background: var(--warn-faint);   border-left-color: var(--warn); }
  .callout-danger { background: var(--danger-faint); border-left-color: var(--danger); }

  /* ===== Raw notes ===== */
  .raw-toggle {
    background: none;
    border: 0;
    color: var(--primary);
    cursor: pointer;
    font-size: var(--fs-sm);
    font-weight: 600;
    padding: var(--space-3) 0;
    transition: var(--t-fast);
  }
  .raw-toggle:hover { color: var(--primary-dark); text-decoration: underline; }
  .raw-list { margin-top: var(--space-3); display: grid; gap: var(--space-3); }
  .raw-item {
    background: var(--surface-alt);
    border: 1px solid var(--neutral-border);
    border-radius: var(--radius);
    padding: var(--space-4);
    font-size: var(--fs-sm);
  }
  .raw-item .meta {
    color: var(--text-muted);
    font-size: var(--fs-xs);
    margin-bottom: var(--space-1);
    display: flex;
    gap: var(--space-3);
    flex-wrap: wrap;
  }
  .raw-item .src-app    { color: var(--info);     font-weight: 600; }
  .raw-item .src-dm     { color: var(--success);  font-weight: 600; }
  .raw-item .src-legacy { color: var(--text-muted); font-weight: 600; }
  .raw-item .body { white-space: pre-wrap; line-height: var(--lh-base); }

  /* ===== ANDPAD section （現状未利用） ===== */
  .andpad-synced {
    color: var(--text-muted);
    font-size: var(--fs-xs);
    font-weight: 400;
    margin-left: var(--space-3);
  }
  .andpad-body { display: grid; gap: var(--space-5); }
  .andpad-group h4 {
    margin: 0 0 var(--space-3);
    font-size: var(--fs-base);
    color: var(--text-strong);
    font-weight: 600;
  }
  .andpad-row {
    display: flex;
    gap: var(--space-4);
    padding: var(--space-1) 0;
    border-bottom: 1px solid var(--neutral-faint);
    font-size: var(--fs-base);
  }
  .andpad-row:last-child { border-bottom: 0; }
  .andpad-k { color: var(--text-muted); min-width: 9em; flex-shrink: 0; }
  .andpad-v { color: var(--text); white-space: pre-wrap; word-break: break-word; }

  /* ===== UI_GUIDE.md §11.2 テーブル ===== */
  .sites table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--fs-base);
  }
  .sites th {
    background: var(--surface-alt);
    font-weight: 600;
    color: var(--text-strong);
    padding: 10px 12px;
    border-bottom: 1px solid var(--neutral-border);
    text-align: left;
    font-size: var(--fs-sm);
  }
  .sites td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--neutral-faint);
    vertical-align: middle;
  }
  .sites tbody tr.site-row { cursor: pointer; transition: background var(--t-fast); }
  .sites tbody tr.site-row:hover { background: var(--primary-faint); }
  .sites tbody tr.site-row.expanded { background: var(--primary-faint); }
  .sites tbody tr.site-row .arrow {
    display: inline-block;
    width: 12px;
    color: var(--text-muted);
    transition: transform var(--t-base);
  }
  .sites tbody tr.site-row.expanded .arrow {
    transform: rotate(90deg);
    color: var(--primary);
  }
  .sites tbody tr.site-detail td {
    background: var(--primary-faint);
    padding: var(--space-4);
    border-bottom: 1px solid var(--neutral-border);
  }
  .sites tbody tr.site-detail .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: var(--space-3) var(--space-6);
    font-size: var(--fs-base);
  }
  .sites tbody tr.site-detail .k {
    color: var(--text-muted);
    margin-right: var(--space-2);
    font-weight: 500;
  }

  /* ===== Login screen ===== */
  .login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--neutral-border);
    border-radius: var(--radius-lg);
    padding: var(--space-7);
    text-align: center;
    max-width: 420px;
  }
  .login-box h2 {
    margin: 0 0 var(--space-3);
    font-size: var(--fs-h);
    font-weight: 600;
    color: var(--text-strong);
  }
  .login-box p {
    color: var(--text-muted);
    margin: 0 0 var(--space-6);
    font-size: var(--fs-base);
    line-height: var(--lh-base);
  }
  .login-box button {
    height: 36px;
    padding: 0 18px;
    background: var(--primary);
    border: 1px solid var(--primary);
    color: #fff;
    border-radius: var(--radius);
    font-size: var(--fs-md);
    font-weight: 600;
    cursor: pointer;
    transition: var(--t-fast);
    display: inline-flex;
    align-items: center;
    gap: var(--space-3);
  }
  .login-box button:hover {
    background: var(--primary-dark);
    border-color: var(--primary-dark);
  }

  /* ===== Empty / loading ===== */
  .empty-state, .loading {
    text-align: center;
    color: var(--text-muted);
    padding: var(--space-7) var(--space-5);
    font-size: var(--fs-base);
  }

  /* ===== Error （callout-danger 系） ===== */
  .error {
    background: var(--danger-faint);
    color: var(--danger);
    padding: var(--space-4);
    border-radius: var(--radius);
    margin: var(--space-4) 0;
    font-size: var(--fs-base);
    display: flex;
    align-items: center;
    gap: var(--space-4);
    flex-wrap: wrap;
    border-left: 3px solid var(--danger);
  }
  .error .retry {
    height: 26px;
    padding: 0 10px;
    background: var(--surface);
    border: 1px solid var(--danger);
    color: var(--danger);
    border-radius: var(--radius);
    font-size: var(--fs-sm);
    font-weight: 600;
    cursor: pointer;
    transition: var(--t-fast);
  }
  .error .retry:hover { background: var(--danger); color: #fff; }

  /* ===== UI_GUIDE.md §15.2 レスポンシブ（スマホ） ===== */
  @media (max-width: 767px) {
    header {
      padding: var(--space-3) var(--space-5);
      flex-wrap: wrap;
      gap: var(--space-3);
    }
    header h1 { font-size: var(--fs-xl); }
    header h1::before { height: 16px; }
    header .user {
      font-size: var(--fs-xs);
      width: 100%;
      order: 3;
      margin-left: 0;
    }
    .container { padding: var(--space-4) var(--space-5); }
    .detail { padding: var(--space-5); }
    .detail h2 { font-size: var(--fs-xl); }

    .andpad-row { flex-direction: column; gap: 0; }
    .andpad-k { font-size: var(--fs-sm); }

    .sites table, .sites thead, .sites tbody, .sites tr, .sites td, .sites th { display: block; }
    .sites thead { display: none; }
    .sites tbody tr {
      border: 1px solid var(--neutral-border);
      border-radius: var(--radius);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
      background: var(--surface);
    }
    .sites tbody tr:hover { background: var(--surface); }
    .sites tbody tr.site-row:hover { background: var(--primary-faint); }
    .sites td {
      padding: 4px 0;
      border: 0;
      text-align: left !important;
      font-size: var(--fs-base);
    }
    .sites td::before {
      content: attr(data-label);
      font-weight: 600;
      color: var(--text-muted);
      margin-right: var(--space-3);
      min-width: 5em;
      display: inline-block;
    }
    .sites td:empty, .sites td[data-empty="1"] { display: none; }
    .sites tbody tr.site-detail td { padding: var(--space-3); }
    .sites tbody tr.site-detail .grid { grid-template-columns: 1fr; gap: 4px 0; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.30.0/lib/msal-browser.min.js"></script>
<script src="app.js"></script>
</body>
</html>
